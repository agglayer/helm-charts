---
metadata:
  env: multi
  costCenter: agglayer

onePasswordSecrets:
  # wallet-balance-exporter: "vaults/myvault/items/myitem"
  #
  # The referenced 1Password item must expose this field (uppercase, env-var
  # naming):
  #   - L1_RPC_URL  RPC URL used to query wallet balances

# Accounts whose ETH balance should be exported as Prometheus metrics. All
# accounts share the same RPC URL (sourced from L1_RPC_URL, provided by the
# onePasswordSecrets-provisioned secret). If you need to monitor accounts on
# different L1s, deploy multiple releases of this chart, one per RPC URL.
#
# Each account requires:
#   - address: 0x... (any casing; auto-checksummed by web3.py)
#   - label: human-readable identifier (used as a metric label and in alert text)
#   - min_balance_eth: optional minimum threshold (omit to skip the
#     wallet_balance_below_minimum metric for this account)
accounts: []
# accounts:
#   - address: "0x23e90adc43b96f87cbae25293b7ed2b5b7cca634"
#     label: "spec-12-op op-batcher"
#     min_balance_eth: 1.0

config:
  checkInterval:
    seconds: 300

ports:
  metrics: 8080

revisionHistoryLimit: 3

replicaCount: 1

image:
  repository: python
  pullPolicy: IfNotPresent
  tag: "3.11-alpine"

imagePullSecrets: []

podAnnotations:
  ad.datadoghq.com/wallet-balance-exporter.checks: |
    {
      "openmetrics": {
        "init_config": {},
        "instances": [
          {
            "openmetrics_endpoint": "http://%%host%%:8080/metrics",
            "namespace": "wallet_balance",
            "metrics": ["^wallet_.*"]
          }
        ]
      }
    }

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

extraEnv: []

envFrom: []
