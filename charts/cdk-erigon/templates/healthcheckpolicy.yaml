{{- if .Values.httpRoutes.rpc.create -}}
apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: {{ include "cdk-erigon.fullname" . }}
  labels:
    {{- include "cdk-erigon.labels" . | nindent 4 }}
spec:
  default:
    {{- $probe := .Values.readinessProbe | default dict }}
    checkIntervalSec: {{ $probe.periodSeconds | default 10 }}
    timeoutSec: {{ $probe.timeoutSeconds | default 5 }}
    healthyThreshold: {{ $probe.successThreshold | default 1 }}
    unhealthyThreshold: {{ $probe.failureThreshold | default 3 }}
    config:
      type: TCP # Erigon's /health expects POST with JSON body {} (see livenessProbe/readinessProbe in statefulset).
      tcpHealthCheck:
        port: {{ .Values.service.rpc.port }}
  targetRef:
    group: ""
    kind: Service
    name: {{ include "cdk-erigon.fullname" . }}
{{- end }}
