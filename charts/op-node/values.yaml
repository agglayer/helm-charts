---
metadata:
  env: bali
  costCenter: agglayer

onePasswordSecrets:
  # op-node: "vaults/myvault/items/myitem"

# Pod annotations (e.g. ad.datadoghq.com/tags for Datadog)
podAnnotations: {}
# podAnnotations:
#   ad.datadoghq.com/tags: '{"network": "mynetwork"}'

podLabels: {}
# podLabels:
#   network: mynetwork

nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints: []

replicaCount: 1

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

container:
  image:
    pullPolicy: IfNotPresent
    repository: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-node
    tag: v1.16.11

storage:
  path: /data
  size: 500Gi

service:
  type: ClusterIP
  clusterIP: None
  rpc:
    port: 9545
  p2p:
    enabled: true
    port: 9222
  annotations: {}

httpRoutes:
  rpc:
    create: false
    hostname: domain.example
    gateway:
      name: gateway
      namespace: gateways

podSecurityContext: {}
securityContext: {}

config:
  extraOptions: []

  sequencer:
    enabled: true
    l1Confs: 4

  # Verifier configuration (used when sequencer.enabled=false)
  verifier:
    l1Confs: 12
    sequencerHttp: ""

  l2:
    opRethAuthUrl: http://op-reth:8551

  log:
    environment: development # "production" or "development"
    level: info

  rollupJson: |
    {}

resources:
  limits:
    memory: 10Gi
  requests:
    cpu: 1
    memory: 2Gi
