{{- if .Values.httpRoutes.rpc.create -}}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ include "op-node.fullname" . }}-rpc
  labels:
    {{- include "op-node.labels" . | nindent 4 }}
spec:
  parentRefs:
    - kind: Gateway
      {{- with .Values.httpRoutes.rpc.gateway }}
      name: {{ .name }}
      namespace: {{ .namespace }}
      {{- end }}
  hostnames:
    - {{ .Values.httpRoutes.rpc.hostname }}
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
        - name: {{ include "op-node.fullname" . }}
          port: {{ .Values.service.rpc.port }}
{{- end }}
