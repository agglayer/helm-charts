---
metadata:
  env: bali
  costCenter: agglayer

onePasswordSecrets:
  # bridge: "vaults/myvault/items/myitem"

# Enable to replace $ENV_VARS in the configmap from a Kubernetes secret
  # Secret names are derived from onePasswordSecrets keys
envSubstitution:
  enabled: true

# Pod annotations (e.g. ad.datadoghq.com/tags for Datadog)
podAnnotations: {}
# podAnnotations:
#   ad.datadoghq.com/tags: '{"network": "mynetwork"}'

nodeSelector: {}
tolerations: []
initContainers: []
extraVolumes: []
extraVolumeMounts: []
topologySpreadConstraints: []

replicaCount: 1

image:
  repository: ghcr.io/0xpolygon/zkevm-bridge-service
  pullPolicy: IfNotPresent
  tag: "v0.6.3-RC4"
  command: ["/app/zkevm-bridge"]
  args: ["run", "--cfg", "/etc/bridge/config/bridge-config.toml"]

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 8080

# GKE HealthCheckPolicy (used when httpRoutes.rest.create is true)
healthCheck:
  requestPath: /healthz
  timeoutSec: 1
  # checkIntervalSec: 10
  # healthyThreshold: 1
  # unhealthyThreshold: 3

ingress:
  create: false
  hostname: domain.example

httpRoutes:
  rest:
    create: false
    hostname: domain.example
    gateway:
      name: gateway
      namespace: gateways

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

resources:
  limits:
    memory: 8Gi
  requests:
    cpu: 2
    memory: 8Gi

config:
  log:
    environment: development # "production" or "development"
    level: info
  db:
    user: bridge
    password: bridge
    name: bridge
    host: postgres
    port: "5432"
  etherman:
    l1Url: ""
    l2Url: "http://cdk-erigon-rpc:8123"
  bridgeServer:
    finalizedGEREnabled: true
  claimTxManager:
    areClaimsBetweenL2sEnabled: false
    privateKey:
      keyName: "" # if this string is not empty, bridge will try to use KMS
      keystoreFileName: "claimtx.keystore"
      keystoreFilePassword: "claimTxKeystorePassword"
  network:
    l1GenBlockNumber: 0
    polygonBridgeAddress: "0x0000000000000000000000000000000000000000"
    polygonZkEVMGlobalExitRootAddress: "0x0000000000000000000000000000000000000000"
    polygonRollupManagerAddress: "0x0000000000000000000000000000000000000000"
    polygonZkEVMAddress: "0x0000000000000000000000000000000000000000"
    l2GenBlockNumbers: 0
    l2PolygonBridgeAddress: "0x0000000000000000000000000000000000000000"
    l2PolygonZkEVMGlobalExitRootAddress: "0x0000000000000000000000000000000000000000"
    requireSovereignChainSmcs: true
  synchronizer:
    forceL2SyncChunk: true
