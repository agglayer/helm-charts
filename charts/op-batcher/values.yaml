---
metadata:
  env: bali
  costCenter: agglayer

onePasswordSecrets:
  # op-batcher: "vaults/myvault/items/myitem"

# Pod annotations (e.g. ad.datadoghq.com/tags for Datadog)
podAnnotations: {}
# podAnnotations:
#   ad.datadoghq.com/tags: '{"network": "mynetwork"}'

podLabels: {}
# podLabels:
#   network: mynetwork

nodeSelector: {}

tolerations: []

affinity: {}

topologySpreadConstraints: []

replicaCount: 1

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

container:
  image:
    pullPolicy: IfNotPresent
    repository: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-batcher
    tag: v1.16.6

service:
  type: ClusterIP
  clusterIP: None
  rpc:
    port: 8548
  annotations: {}

podSecurityContext: {}
securityContext: {}

config:
  extraOptions: {}

  dataAvailabilityType: blobs

  l2:
    opGethUrl: http://op-geth:8545
    opNodeUrl: http://op-node:9545

  log:
    level: info # trace, debug, info, warn, error, crit
    format: json # text, terminal, logfmt, terminal-color, json, json-pretty

resources:
  limits:
    memory: 10Gi
  requests:
    cpu: 1
    memory: 2Gi
