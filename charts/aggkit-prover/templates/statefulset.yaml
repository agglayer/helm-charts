apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "aggkit-prover.fullname" . }}
  labels:
    {{- include "aggkit-prover.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "aggkit-prover.selectorLabels" . | nindent 6 }}
  serviceName: {{ include "aggkit-prover.fullname" . }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "aggkit-prover.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "aggkit-prover.serviceAccountName" . }}
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: Always
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.tolerations }}
      tolerations:
        {{- . | toYaml | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- . | toYaml | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- . | toYaml | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range $constraint := . }}
        - {{ toYaml $constraint | nindent 10 | trim }}
            {{- if not $constraint.labelSelector }}
          labelSelector:
            matchLabels:
              {{- include "aggkit-prover.selectorLabels" $ | nindent 14 }}
            {{- end }}
        {{- end }}
      {{- end }}
      {{- if .Values.envSubstitution.enabled }}
      initContainers:
        - name: config-env-substitution
          image: alpine:latest
          command: ["/bin/sh"]
          args:
            - "-c"
            - |
              apk add gettext > /dev/null 2>&1
              envsubst < /config-raw/aggkit-prover-config.toml > /config/aggkit-prover-config.toml
              cp /genesis-raw/genesis.json /config/genesis.json
          envFrom:
            {{- range $name, $_ := .Values.onePasswordSecrets }}
            - secretRef:
                name: {{ $name }}
            {{- end }}
          volumeMounts:
            - name: config-raw
              mountPath: /config-raw
              readOnly: true
            - name: genesis-raw
              mountPath: /genesis-raw
              readOnly: true
            - name: config
              mountPath: /config
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsGroup: 0
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $name, $_ := .Values.onePasswordSecrets }}
            - name: NETWORK_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $name }}
                  key: SP1_NETWORK_PRIVATE_KEY
                  optional: true
            {{- end }}
          {{- if .Values.onePasswordSecrets }}
          envFrom:
            {{- range $name, $_ := .Values.onePasswordSecrets }}
            - secretRef:
                name: {{ $name }}
            {{- end }}
          {{- end }}
          {{ if .Values.image.command }}
          command: {{- range .Values.image.command }}
            - {{ . }} {{- end}}
          {{- end}}
          {{ if .Values.image.args }}
          args: {{- range .Values.image.args }}
            - {{ . }} {{- end}}
          {{- end}}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: datadir
              mountPath: {{ .Values.datadir.path }}
              readOnly: false
            {{- if .Values.envSubstitution.enabled }}
            - name: config
              mountPath: /etc/aggkit/
              readOnly: true
            {{- else }}
            - name: aggkit-prover-config
              mountPath: /etc/aggkit/
              readOnly: true
            {{- end }}
      volumes:
        {{- if .Values.envSubstitution.enabled }}
        - name: config-raw
          configMap:
            name: {{ include "aggkit-prover.fullname" . }}
            items:
              - key: "aggkit-prover-config.toml"
                path: "aggkit-prover-config.toml"
        - name: genesis-raw
          configMap:
            name: {{ include "aggkit-prover.fullname" . }}-genesis
            items:
              - key: "genesis.json"
                path: "genesis.json"
        - name: config
          emptyDir: {}
        {{- else }}
        - name: aggkit-prover-config
          projected:
            sources:
              - configMap:
                  name: {{ include "aggkit-prover.fullname" . }}
                  items:
                    - key: "aggkit-prover-config.toml"
                      path: "aggkit-prover-config.toml"
              - configMap:
                  name: {{ include "aggkit-prover.fullname" . }}-genesis
                  items:
                    - key: "genesis.json"
                      path: "genesis.json"
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: datadir
      spec:
        {{- with .Values.datadir.storageClass }}
        storageClassName: {{ . }}
        {{- end }}
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: {{ .Values.datadir.size }}
